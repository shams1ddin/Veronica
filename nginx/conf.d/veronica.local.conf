# ── Nginx конфиг для локальной разработки (без SSL) ──────────────────────────
# Используй этот файл вместо veronica.conf при локальном запуске:
#   cp nginx/conf.d/veronica.local.conf nginx/conf.d/veronica.conf

server {
    listen 80;
    server_name localhost;

    client_max_body_size 15m;

    location / {
        proxy_pass         http://veronica:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SSE Streaming
    location /veronica/stream {
        proxy_pass         http://veronica:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }
}
